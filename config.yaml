# OpenEvolve configuration
# Keys are loaded from .env; OPENAI_API_KEY is set at runtime (see notebook).
#
# ── Switch backends by uncommenting one llm block ────────────────────────────

max_iterations: 100

# Use full rewrites — small models struggle with diff format
diff_based_evolution: false

# ── Local vLLM (recommended — no rate limits) ─────────────────────────────────
llm:
  api_base: "http://localhost:8000/v1"
  primary_model: "Qwen/Qwen2.5-Coder-14B-Instruct"
  temperature: 0.7

# ── Groq (free tier hits 500k token/day limit quickly) ────────────────────────
# llm:
#   api_base: "https://api.groq.com/openai/v1"
#   primary_model: "llama-3.1-8b-instant"
#   temperature: 0.7

database:
  population_size: 50
  num_islands: 3
  exploitation_ratio: 0.7

evaluator:
  timeout: 30
  num_workers: 4   # can increase with local model — no rate limits
